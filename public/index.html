<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" sizes="any" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <meta name="theme-color" content="#f4efe4" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#2b2825" media="(prefers-color-scheme: dark)" />

    <title>Bench Notes - React internals logbook</title>
    <meta
      name="description"
      content="An interactive logbook of React internals - live specimens covering hooks, HOCs, reducers, refs, concurrent features, and component lifecycle."
    />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Bench Notes - React internals logbook" />
    <meta
      property="og:description"
      content="An interactive logbook of React internals - live specimens you can actuate and measure in the browser."
    />

    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var dark =
            stored === "dark" ||
            (!stored && window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
